<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Roboto+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>王韋仁 Matthew Wang — FENDL</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0EFED;
  --black: #1a1a1a;
  --grey: #999999;
  --light-grey: #c8c8c8;
  --border: #d0cfc9;
  --margin: 50px;
  --heading: 56px;
  --body: 24px;
  --small: 18px;
}

html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; }

body {
  background: var(--bg);
  color: #444444;
  font-family: 'Noto Serif TC', serif;
  font-size: var(--body);
  width: 100%; margin: 0;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px var(--margin);
  background: rgba(240,239,237,0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}

.nav-name {
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 48px;
  list-style: none;
}

.nav-links a {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  color: var(--grey);
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--black); }
.nav-resume-btn { }

/* PROJECT HERO */
.project-hero {
  width: 100%;
  overflow: hidden;
  position: relative;
  background: #e8e5df;
  min-height: 60vh;
  display: flex;
  align-items: flex-end;
}

.project-hero img {
  width: 100%;
  height: auto;
  display: block;
}

.project-hero-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 60px var(--margin);
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.project-hero-title {
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 900;
  font-size: 124px;
  letter-spacing: 0.06em;
  color: #fff;
  line-height: 1;
}

.project-hero-subtitle {
  font-family: 'Noto Serif TC', serif;
  font-size: 27px;
  color: rgba(255,255,255,0.7);
  max-width: 500px;
  text-align: right;
  line-height: 1.6;
}

/* PROJECT META */
.project-meta {
  padding: 80px var(--margin);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.meta-item {
  padding: 0 40px 0 0;
  border-right: 1px solid var(--border);
  margin-right: 40px;
}

.meta-item:last-child {
  border-right: none;
  margin-right: 0;
}

.meta-label {
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 900;
  font-size: var(--small);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--light-grey);
  margin-bottom: 12px;
}

.meta-value {
  font-family: 'Noto Serif TC', serif;
  font-size: var(--body);
  color: var(--black);
  line-height: 1.6;
}

/* PROJECT CONTENT */
.project-content {
  padding: 100px var(--margin);
}

.project-section {
  margin-bottom: 120px;
}

.project-section-label {
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 900;
  font-size: var(--small);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--light-grey);
  margin-bottom: 28px;
}

.project-section-heading {
  font-family: 'Noto Serif TC', serif;
  font-size: var(--heading);
  font-weight: 400;
  color: var(--black);
  margin-bottom: 32px;
  line-height: 1.2;
}

.project-section-body {
  font-family: 'Noto Serif TC', serif;
  font-size: var(--body);
  color: var(--grey);
  line-height: 1.9;
  max-width: 760px;
}

/* SPLIT LAYOUT */
.split-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
  margin-bottom: 80px;
}

.split-layout.reverse { direction: rtl; }
.split-layout.reverse > * { direction: ltr; }

/* IMAGE GRIDS */
.img-full { width: 100%; margin-bottom: 2px; }
.img-full img { width: 100%; height: auto; display: block; }

.img-two {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  margin-bottom: 2px;
}
.img-two img { width: 100%; height: auto; display: block; }

.img-three {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 2px;
  margin-bottom: 2px;
}
.img-three img { width: 100%; height: auto; display: block; }

.img-caption {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: var(--small);
  letter-spacing: 0.1em;
  color: var(--light-grey);
  padding: 14px 0 40px;
}

/* TOOLS */
.tools-grid {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.tool-tag {
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 900;
  font-size: var(--small);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--grey);
  padding: 8px 20px;
  border: 1px solid var(--border);
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 80px var(--margin);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.footer-name {
  font-family: 'Roboto Condensed', sans-serif;
  font-weight: 900;
  font-size: 60px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--black);
  line-height: 1;
}

.footer-sub {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  color: var(--grey);
  margin-top: 12px;
}

.footer-contact {
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.footer-contact a,
.footer-contact span {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: var(--small);
  letter-spacing: 0.1em;
  color: var(--grey);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-contact a:hover { color: var(--black); }

.footer-copy {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 14px;
  letter-spacing: 0.12em;
  color: var(--light-grey);
  margin-top: 24px;
}

/* FADE IN ON SCROLL */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.reveal.visible {
  opacity: 1;
  transform: none;
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  :root { --margin: 20px; --heading: 32px; --body: 17px; --small: 14px; }

  nav { padding: 18px var(--margin); }
  .nav-links { gap: 20px; }
  .nav-links a { font-size: 14px; }

  .project-hero-overlay { padding: 24px var(--margin); flex-direction: column; align-items: flex-start; gap: 4px; }
  .project-hero-title { font-size: 52px; }
  .project-hero-subtitle { font-size: 16px; max-width: 100%; text-align: left; }

  .project-meta { grid-template-columns: 1fr 1fr; padding: 40px var(--margin); }
  .meta-item { padding: 28px 16px 28px 0; margin-right: 0; border-right: none; border-bottom: 1px solid var(--border); }
  .meta-item:nth-child(odd) { border-right: 1px solid var(--border); padding-right: 16px; }
  .meta-item:nth-child(even) { padding-left: 16px; }
  .meta-item:nth-last-child(-n+2) { border-bottom: none; }
  .meta-value { font-size: 18px; }

  .project-content { padding: 48px var(--margin); }
  .project-section { margin-bottom: 60px; }
  .project-section-body { max-width: 100%; }

  .split-layout { grid-template-columns: 1fr; gap: 32px; }
  .split-layout.reverse { direction: ltr; }

  footer { flex-direction: column; align-items: flex-start; gap: 32px; padding: 48px var(--margin); }
  .footer-name { font-size: 36px; }
  .footer-contact { text-align: left; }
}
</style>
</head>

<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
